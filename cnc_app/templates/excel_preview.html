<!DOCTYPE html>
<html>
<head>
<title>Preview</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

<h3>Preview Data</h3>

<table class="table table-bordered">

<thead>
<tr>
{% for key in preview.0.keys %}
<th>{{ key }}</th>
{% endfor %}
</tr>
</thead>

<tbody>

{% for row in preview %}
<tr>
{% for val in row.values %}
<td>{{ val }}</td>
{% endfor %}
</tr>
{% endfor %}

</tbody>

</table>

<form method="POST" action="/confirm-upload/">
{% csrf_token %}
<button class="btn btn-success">Confirm Upload</button>
</form>

</div>

</body>
</html>
