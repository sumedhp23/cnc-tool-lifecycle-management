<!DOCTYPE html>
<html>
<head>
<title>Missing Fields</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

<h3 class="text-danger">Missing Required Columns</h3>

<ul class="list-group mb-4">
{% for col in missing_columns %}
<li class="list-group-item">{{ col }}</li>
{% endfor %}
</ul>

<form method="POST">
{% csrf_token %}
<input type="hidden" name="bypass" value="true">

<button class="btn btn-warning">
Proceed Anyway (Bypass)
</button>

<a href="/upload-excel/" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

</body>
</html>
