<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Submitted | CNC System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

    <style>
        /* Base Styles (Matching Main Page) */
        body {
            background: #f1f5f9;
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            color: #334155;
        }

        /* Sidebar (Exact Match) */
        .sidebar {
            position: fixed; left: 0; top: 0; width: 250px; height: 100vh;
            background: #0f172a; padding: 25px 20px; color: white;
        }
        .sidebar h4 { margin-bottom: 25px; font-size: 1.2rem; }
        .sidebar a {
            display: block; color: #cbd5f5; padding: 10px 12px;
            margin-bottom: 8px; border-radius: 6px; text-decoration: none; font-size: 14px;
        }
        .sidebar a:hover { background: #1e293b; color: white; }

        .live-box {
            background: #1e293b; padding: 12px; border-radius: 8px;
            font-size: 13px; margin-bottom: 20px; border: 1px solid #334155;
        }

        /* Main Content Layout */
        .main-content { 
            margin-left: 250px; 
            padding: 30px 40px; 
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }

        /* Success Card Styling */
        .success-card {
            background: white;
            max-width: 550px;
            width: 100%;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        .success-icon {
            font-size: 70px;
            color: #22c55e;
            margin-bottom: 25px;
        }

        .success-card h2 {
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 15px;
        }

        .success-card p {
            color: #64748b;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        /* Buttons */
        .btn-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-custom {
            padding: 12px 20px;
            font-weight: 600;
            font-size: 14px;
            border-radius: 8px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
        }

        .btn-primary-custom { background: #2563eb; color: white; border: none; }
        .btn-primary-custom:hover { background: #1d4ed8; color: white; transform: translateY(-1px); }

        .btn-outline-custom { background: white; color: #334155; border: 1px solid #d1d5db; }
        .btn-outline-custom:hover { background: #f8fafc; color: #0f172a; border-color: #94a3b8; }

    </style>
</head>
<body>

    <div class="sidebar">
        <h4><i class="fa-solid fa-industry me-2"></i> CNC System</h4>
        <div class="live-box">
            <div><strong>Date:</strong> <span id="liveDate"></span></div>
            <div><strong>Time:</strong> <span id="liveTime"></span></div>
            <div><strong>Shift:</strong> <span id="liveShift"></span></div>
        </div>
        <a href="/"><i class="fa-solid fa-plus me-2"></i> Submit Report</a>
        <a href="/reports/"><i class="fa-solid fa-list me-2"></i> View Reports</a>
        <a href="/admin/"><i class="fa-solid fa-gear me-2"></i> Admin Panel</a>
    </div>

    <div class="main-content">
        <div class="success-card">
            <div class="success-icon">
                <i class="fa-solid fa-circle-check"></i>
            </div>

            <h2>Report Submitted!</h2>
            <p>
                The tool lifecycle data has been successfully processed and added to the database for monitoring.
            </p>

            <div class="btn-stack">
                <a href="/" class="btn-custom btn-primary-custom">
                    <i class="fa-solid fa-plus me-2"></i> Submit New Report
                </a>
                <div class="d-flex gap-2">
                    <a href="/reports/" class="btn-custom btn-outline-custom w-100">
                        <i class="fa-solid fa-table-list me-2"></i> View Reports
                    </a>
                    <a href="/admin/" class="btn-custom btn-outline-custom w-100">
                        <i class="fa-solid fa-user-shield me-2"></i> Admin
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Clock functionality to match main page
        function updateClock(){
            const now = new Date();
            document.getElementById("liveDate").innerText = now.toLocaleDateString();
            document.getElementById("liveTime").innerText = now.toLocaleTimeString();
            const hour = now.getHours();
            let shift = (hour>=6 && hour<14) ? "A" : (hour>=14 && hour<22) ? "B" : "C";
            document.getElementById("liveShift").innerText = shift;
        }
        updateClock();
        setInterval(updateClock, 1000);
    </script>

</body>
</html>
