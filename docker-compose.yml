version: '3.9'

services:

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: ${DB_PASSWORD:-YourStrong@Pass123}
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-U", "sa", "-P", "${DB_PASSWORD:-YourStrong@Pass123}", "-Q", "SELECT 1"]
      interval: 10s
      timeout: 3s
      retries: 10

  init-db:
    image: mcr.microsoft.com/mssql-tools
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./database:/scripts
    environment:
      SA_PASSWORD: ${DB_PASSWORD:-YourStrong@Pass123}
    command: /bin/bash /scripts/init_db.sh